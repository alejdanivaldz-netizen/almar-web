<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Gracias por contactarnos! | ALMAR Servicios Fluviales</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#1B5E20">
<link rel="icon" type="image/png" href="assets/almar-logo-color.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#2D7D32; --primary-dark:#0E3D14; --primary-mid:#1B5E20; --primary-light:#66BB6A;
  --bg:#FFFFFF; --bg-soft:#F2F8F3;
  --text:#15241A; --text-muted:#5B6E60; --border:#E1EAE3;
  --shadow:0 18px 50px -22px rgba(14,61,20,.35);
  --display:'Oswald', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg-soft) 100%)}
.card{max-width:560px;width:100%;text-align:center;background:#fff;border:1px solid var(--border);
  border-radius:24px;padding:48px 40px;box-shadow:var(--shadow)}
.logo{height:72px;width:auto;margin:0 auto 28px}
.eyebrow{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.22em;
  font-weight:600;font-size:.82rem;color:var(--primary);margin-bottom:14px}
.check{width:72px;height:72px;margin:0 auto 24px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;background:var(--primary-light);box-shadow:0 12px 30px -12px rgba(45,125,50,.6)}
.check svg{width:38px;height:38px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
h1{font-family:var(--display);font-weight:600;font-size:2.1rem;line-height:1.1;color:var(--primary-dark);margin-bottom:14px}
p{color:var(--text-muted);font-size:1.05rem;margin-bottom:32px}
.btn{display:inline-flex;align-items:center;gap:10px;font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:1.05rem;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;
  background:var(--primary);color:#fff;padding:14px 30px;border-radius:999px;transition:.2s}
.btn:hover{background:var(--primary-mid);transform:translateY(-2px);box-shadow:0 12px 26px -10px rgba(45,125,50,.7)}
</style>
</head>
<body>
  <main class="card">
    <img class="logo" src="assets/almar-logo-color.png" alt="ALMAR Servicios Fluviales">
    <div class="check"><svg viewBox="0 0 24 24"><path d="M4 12.5l5 5 11-11"/></svg></div>
    <p class="eyebrow">Mensaje recibido</p>
    <h1>¡Gracias por contactarnos!</h1>
    <p>Recibimos tu mensaje correctamente. Nuestro equipo te responderá a la brevedad. Estamos disponibles las 24 horas.</p>
    <a class="btn" href="/">Volver al inicio</a>
  </main>
</body>
</html>
